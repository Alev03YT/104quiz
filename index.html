<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>104Quiz Generator</title>
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand"><div class="logo">🔒</div><div><h1>104<span>QUIZ</span></h1><p>Genera quiz perfetti ogni volta.</p></div></div>
      <div class="panel"><h3>1. CONFIGURAZIONE</h3><p class="muted">Soluzione precedente</p><input id="prev" placeholder="Es: 734" /><p class="muted">Numero di cifre</p><div class="choices"><button class="choice active" data-len="3">3</button><button class="choice" data-len="4">4</button><button class="choice" data-len="5">5</button></div><button id="gen">⚡ GENERA QUIZ</button><button class="dark" id="regen">↻ RIGENERA ALTRO QUIZ</button></div>
      <div class="panel"><h3>2. ESPORTA</h3><button class="purple" id="exportClues">🎬 SCARICA SOLO GLI INDIZI<br><span class="muted">PNG trasparente per CapCut</span></button><button class="dark" id="exportQuiz">⬇ SCARICA IMMAGINE COMPLETA<br><span class="muted">Formato TikTok 1080x1920</span></button><button class="dark" id="copyQuiz">📋 COPIA TESTO</button><button class="dark" id="copyDesc">📋 COPIA DESCRIZIONE</button><button class="red" id="reset">🗑 RESET</button></div>
    </aside>
    <main class="main">
      <div class="topbar"><h2>ANTEPRIMA TEMPLATE</h2><span class="muted" id="status">Pronto</span></div>
      <div class="preview"><div class="poster" id="poster"></div></div>
    </main>
    <aside>
      <div class="panel"><h3 class="st">DATI DEL QUIZ</h3><p class="muted">Soluzione precedente</p><input id="prevMirror" readonly><p class="muted">Numero di cifre</p><input id="lenMirror" readonly><p class="muted">Codice generato</p><input id="codeMirror" readonly></div>
      <div class="panel"><h3 class="st">SOLUZIONE</h3><div class="sol" id="solBox"></div></div>
      <div class="panel"><h3 class="st">DESCRIZIONE TIKTOK</h3><textarea id="desc"></textarea></div>
      <div class="panel"><h3 class="st">RAGIONAMENTO</h3><div class="reason" id="reason"></div></div>
    </aside>
    <section class="panel progress"><h3 class="st">SOLUZIONI DOPO OGNI INDIZIO</h3><div class="proggrid" id="progress"></div></section>
  </div>
  <div class="toast" id="toast"></div>
  <canvas id="canvas" width="1080" height="1920"></canvas>
  <canvas id="overlayCanvas" width="1080" height="820"></canvas>
  <script src="script.js?v=12"></script>
</body>
</html>
